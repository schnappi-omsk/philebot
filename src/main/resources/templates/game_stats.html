<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <script th:src="@{/js/bootstrap.bundle.js}"></script>

    <title>Game statistics</title>
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light" role="navigation">
        <a class="navbar-brand" href="#">Phil E-Bot</a>
    </nav>
</header>

<main>
    <div class="container py-3">
        <div class="row">
            <div class="col-sm py-2" th:each="letter : ${alphabet}">
                <a role="link" th:href="${'#' + letter}" th:text="${letter}" th:alt="${letter}"/>
            </div>
        </div>
    </div>

    <div class="d-flex align-items-center justify-content-center min-vh-50">
        <div class="text-center mb-4">
            <img th:src="${title.getTitleImg()}" class="rounded mx-auto d-block" th:alt="${title.getName()}" style="max-width: 30%; max-height: 30%;"/>
            <h1 th:text="${title.getName() + ' chat statistics'}"></h1>
        </div>
    </div>

    <div class="d-flex justify-content-center mt-5">
        <table class="table table-hover table-bordered mx-auto" style="width: 500px;">
            <thead>
            <tr>
                <th scope="col">Player</th>
                <th scope="col">Completion</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="record: ${statistics}">
                <td th:text="${record.key}"></td>
                <td th:text="${record.value} + '%'"></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
