xapi:
  baseUrl: https://xapi.us/api
  apiToken: Bearer ${API_TOKEN}
tg:
  baseUrl: https://api.telegram.org/bot
  apiToken: ${TGAPI_TOKEN}
  botName: Asha E-Bot
  systemCaller: Asha Sharma
  systemArg: Power your dreams
ebot:
  serviceHost: ${SERVICE_HOST}
  limitPerUser: 5
  requestsPerMin: 10.0
clown:
